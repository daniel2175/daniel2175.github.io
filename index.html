// Compress image before storing to keep payload small
function compressImg(file, maxW, maxH, quality=0.75){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        let {width:w,height:h}=img;
        const ratio=Math.min(maxW/w,maxH/h,1);
        w=Math.round(w*ratio); h=Math.round(h*ratio);
        const canvas=document.createElement('canvas');
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg',quality));
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

const REL_TYPES = {
  day: [
    { id:"family",    zh:"家人",     color:"#2563EB" },
    { id:"lover",     zh:"情人",     color:"#EC4899" },
    { id:"friend",    zh:"朋友",     color:"#1C1E22" },
    { id:"classmate", zh:"同學",     color:"#1C1E22" },
    { id:"colleague", zh:"同事",     color:"#1C1E22" },

  ],
  night: [

    { id:"masterslave", zh:"主奴",     color:"#9333EA" },
    { id:"secretlover", zh:"秘密情人", color:"#EA8C20" },
  ],
};
const ALL_REL = [...REL_TYPES.day, ...REL_TYPES.night];
function relDef(typeId){ return ALL_REL.find(r=>r.id===typeId); }
function relPeriod(typeId){ return REL_TYPES.day.some(r=>r.id===typeId) ? "day" : "night"; }
// On dark bg, black lines are invisible — substitute light gray
function relColor(typeId, isDark){
  const d = relDef(typeId); if(!d) return "#888";
  if(isDark && d.color === "#1C1E22") return "#B8C0D0";
  return d.color;
}

let NID = 1, RID = 1;

// ── UI primitives ─────────────────────────────────────────────────────────
function Panel({children,th,style={}}){
  return <div style={{background:th.card,border:`1px solid ${th.cardBorder}`,borderRadius:6,overflow:"hidden",...style}}>{children}</div>;
}
function PanelHeader({label,sub,color,th,right}){
  return (
    <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderBottom:`1px solid ${th.divider}`,background:th.panel}}>
      {color&&<div style={{width:3,height:18,borderRadius:2,background:color,flexShrink:0}}/>}

      {sub&&<span style={{fontSize:10,color:th.textMuted}}>{sub}</span>}
      {right&&<div style={{marginLeft:"auto"}}>{right}</div>}
    </div>
  );
}
function Avatar({p,size=44,round=false,th}){
  const radius = round ? "50%" : 5;
  if(p.img) return <img src={p.img} style={{width:size,height:size,borderRadius:radius,objectFit:"cover",flexShrink:0}}/>;
  const colors=["#C8920A","#B03898","#5830C8","#1860C0","#0888A8","#248858"];
  const bg=colors[p.id%colors.length];
  return <div style={{width:size,height:size,borderRadius:radius,background:bg+"28",border:`1.5px solid ${bg}55`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*0.36,fontWeight:700,color:bg,flexShrink:0}}>{p.name[0]}</div>;
}

function Overlay({children,onClose,align="center"}){
  return (
    <div onClick={e=>{if(e.target===e.currentTarget)onClose();}} style={{position:"fixed",inset:0,zIndex:500,background:"rgba(0,0,0,0.65)",backdropFilter:"blur(4px)",display:"flex",alignItems:align,justifyContent:"center",padding:16}}>
      {children}

}

// RELATIONSHIP PAGE — graph view
// ═══════════════════════════════════════════════════════════════════════════
function RelationshipPage({people,rels,th,isDark}){
  const period = isDark ? "night" : "day";
  const visRels = rels.filter(r => relPeriod(r.type) === period);
  const types = REL_TYPES[period];

  // Only show people involved or all people? Show all people as nodes.
  const W = 340; // logical canvas width
  const n = people.length;
  // circular layout
  const R = Math.min(140, 60 + n*8);
  const H = Math.max(320, R*2 + 110);
  const cx = W/2, cy = H/2;
  const NODE = 52;

  const pos = {};
  people.forEach((p,i)=>{
    const a = (i / Math.max(1,n)) * Math.PI*2 - Math.PI/2;
    pos[p.id] = { x: cx + R*Math.cos(a), y: cy + R*Math.sin(a) };
  });

  return (
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {/* Legend */}
      <Panel th={th}>
        <PanelHeader label={period==="day"?"Day Network":"Night Network"} sub={`${visRels.length} connections`} color={th.accent} th={th}/>
        <div style={{padding:"10px 14px",display:"flex",flexWrap:"wrap",gap:10}}>
          {types.map(t=>(
            <div key={t.id} style={{display:"flex",alignItems:"center",gap:5}}>
              <div style={{width:16,height:3,borderRadius:2,background:relColor(t.id,isDark)}}/>
              <span style={{fontSize:10,fontWeight:600,color:th.textSub}}>{t.zh}</span>
            </div>
          ))}
        </div>
      </Panel>

      {/* Graph */}
      <Panel th={th}>
        {people.length===0 ? (
          <div style={{textAlign:"center",padding:"48px 0",color:th.textMuted,fontSize:13}}>No residents yet.</div>
        ) : (
        <div style={{width:"100%",overflow:"hidden"}}>
          <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto",display:"block"}}>
            {/* Edges */}
            {visRels.map(r=>{
              const a=pos[r.a], b=pos[r.b];
              if(!a||!b) return null;
              const col = relColor(r.type, isDark);
              const mx=(a.x+b.x)/2, my=(a.y+b.y)/2;
              return (
                <g key={r.id}>
                  <line x1={a.x} y1={a.y} x2={b.x} y2={b.y} stroke={col} strokeWidth="2" strokeLinecap="round" opacity="0.85"/>
                  <rect x={mx-16} y={my-8} width="32" height="14" rx="3" fill={th.card} stroke={col} strokeWidth="0.8"/>
                  <text x={mx} y={my+2.5} textAnchor="middle" fontSize="8" fontWeight="700" fill={col}>{relDef(r.type)?.zh}</text>
                </g>
              );
            })}
            {/* Nodes */}
            {people.map(p=>{
              const {x,y}=pos[p.id];
              return (
                <g key={p.id}>
                  <clipPath id={`clip${p.id}`}><circle cx={x} cy={y} r={NODE/2}/></clipPath>
                  <circle cx={x} cy={y} r={NODE/2+2} fill={th.card} stroke={th.cardBorder} strokeWidth="1.5"/>
                  {p.img
                    ? <image href={p.img} x={x-NODE/2} y={y-NODE/2} width={NODE} height={NODE} clipPath={`url(#clip${p.id})`} preserveAspectRatio="xMidYMid slice"/>
                    : <>
                        <circle cx={x} cy={y} r={NODE/2} fill={th.panel}/>
                        <text x={x} y={y+6} textAnchor="middle" fontSize="18" fontWeight="700" fill={th.textSub}>{p.name[0]}</text>
                      </>
                  }
                  <text x={x} y={y+NODE/2+13} textAnchor="middle" fontSize="9.5" fontWeight="700" fill={th.text}>{p.name}</text>
                </g>
              );
            })}
          </svg>
        </div>
        )}
      </Panel>

      {visRels.length===0 && people.length>0 && (
        <div style={{textAlign:"center",padding:"8px 0",color:th.textMuted,fontSize:11}}>
          No {period} relationships yet. Add them from a resident's profile.
        </div>
      )}
    </div>
  );
}

// RESIDENTS PAGE
// ═══════════════════════════════════════════════════════════════════════════
function ResidentsPage({people,setPeople,rels,setRels,th,isDark,showToast}){
  const [sel,setSel]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [form,setForm]=useState({name:"",img:null,portrait:null,age:""});
  const fRef=useRef(); const pRef=useRef();
  // readImg replaced by compressImg

  const add=()=>{
    if(!form.name.trim()) return;
    setPeople(prev=>[...prev,{id:NID++,name:form.name.trim(),img:form.img,portrait:form.portrait,age:form.age,birthday:"",height:"",personality:"",theme:"day"}]);
    setForm({name:"",img:null,portrait:null,age:""});
    setShowAdd(false);
    showToast(`${form.name} moved in`);
  };
  const update=(id,u)=>setPeople(prev=>prev.map(p=>p.id===id?{...p,...u}:p));
  const remove=id=>{
    setPeople(prev=>prev.filter(p=>p.id!==id));
    setRels(prev=>prev.filter(r=>r.a!==id&&r.b!==id));
    showToast("Resident removed");
  };
  const addRel=(a,b,type)=>{
    setRels(prev=>[...prev.filter(r=>!((r.a===a&&r.b===b)||(r.a===b&&r.b===a))),{id:RID++,a,b,type}]);
    showToast(`Relationship added: ${relDef(type)?.zh}`);
  };
  const removeRel=id=>setRels(prev=>prev.filter(r=>r.id!==id));

  const selected = people.find(p=>p.id===sel);

  return (
    <div style={{position:"relative",minHeight:"100%"}}>
      {people.length===0 ? (
        <div style={{textAlign:"center",padding:"64px 0",color:th.textMuted,fontSize:13}}>
          No residents yet.<br/><span style={{fontSize:11}}>Tap ＋ to add the first one.</span>
        </div>
      ) : (
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(100px, 1fr))",gap:10}}>
          {people.map(p=>(
            <div key={p.id} onClick={()=>setSel(p.id)} style={{background:th.card,border:`1px solid ${th.cardBorder}`,borderRadius:8,overflow:"hidden",cursor:"pointer",boxShadow:`0 1px 4px ${th.shadow}`}}>
              <div style={{aspectRatio:"3/4",background:th.panel,overflow:"hidden"}}>
                {(p.portrait||p.img)?<img src={p.portrait||p.img} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,fontWeight:700,color:th.textMuted}}>{p.name[0]}</div>}
              </div>
              <div style={{padding:"8px 10px"}}>
                <div style={{fontSize:12,fontWeight:700,color:th.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</div>
                <div style={{fontSize:10,color:th.textMuted,marginTop:1}}>{p.age?`Age ${p.age}`:"—"}</div>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* FAB */}
      <button onClick={()=>setShowAdd(true)} style={{position:"fixed",right:18,bottom:"calc(env(safe-area-inset-bottom,0px) + 76px)",width:52,height:52,borderRadius:"50%",border:"none",background:th.accent,color:"#fff",fontSize:26,fontWeight:400,cursor:"pointer",boxShadow:`0 4px 16px ${th.accent}66`,zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>＋</button>

      {/* Add modal */}
      {showAdd && (
        <Overlay onClose={()=>setShowAdd(false)}>
          <div style={{width:"100%",maxWidth:340,background:th.card,border:`1px solid ${th.cardBorder}`,borderRadius:8,overflow:"hidden",boxShadow:`0 16px 48px ${th.shadow}`}}>
            <PanelHeader label="New Resident" th={th} right={<button onClick={()=>setShowAdd(false)} style={{border:"none",background:"transparent",color:th.textMuted,fontSize:13,cursor:"pointer"}}>✕</button>}/>
            <div style={{padding:"14px",display:"flex",flexDirection:"column",gap:10}}>
              <div style={{display:"flex",gap:14,justifyContent:"center",alignItems:"flex-end"}}>
                {/* Round avatar */}
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
                  <label htmlFor="add-avatar" style={{width:64,height:64,borderRadius:"50%",border:`2px dashed ${th.divider}`,background:th.panel,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",overflow:"hidden"}}>
                    {form.img?<img src={form.img} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span style={{fontSize:20,opacity:0.35}}>📷</span>}
                  </label>
                  <span style={{fontSize:9,color:th.textMuted,fontWeight:600,letterSpacing:0.5}}>AVATAR</span>
                  <input id="add-avatar" type="file" accept="image/*" style={{display:"none"}} onChange={e=>e.target.files[0]&&compressImg(e.target.files[0],200,200).then(src=>setForm(f=>({...f,img:src})))}/>
                </div>
                {/* Portrait rect */}
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
                  <label htmlFor="add-portrait" style={{width:72,height:96,borderRadius:6,border:`2px dashed ${th.divider}`,background:th.panel,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",overflow:"hidden"}}>
                    {form.portrait?<img src={form.portrait} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span style={{fontSize:20,opacity:0.35}}>🖼</span>}
                  </label>
                  <span style={{fontSize:9,color:th.textMuted,fontWeight:600,letterSpacing:0.5}}>PORTRAIT</span>
                  <input id="add-portrait" type="file" accept="image/*" style={{display:"none"}} onChange={e=>e.target.files[0]&&compressImg(e.target.files[0],600,900).then(src=>setForm(f=>({...f,portrait:src})))}/>
                </div>
              </div>
              <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="Name..." style={{padding:"10px 12px",borderRadius:4,background:th.panel,border:`1px solid ${th.divider}`,color:th.text,fontSize:14,fontWeight:600,outline:"none",fontFamily:"inherit"}}/>
              <input value={form.age} onChange={e=>setForm(f=>({...f,age:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&add()} placeholder="Age" style={{padding:"9px 12px",borderRadius:4,background:th.panel,border:`1px solid ${th.divider}`,color:th.text,fontSize:13,outline:"none",fontFamily:"inherit"}}/>
              <button onClick={add} disabled={!form.name.trim()} style={{padding:"11px",borderRadius:4,border:"none",background:form.name.trim()?th.accent:th.divider,color:form.name.trim()?"#fff":th.textMuted,fontSize:13,fontWeight:700,cursor:form.name.trim()?"pointer":"not-allowed",fontFamily:"inherit"}}>Move In</button>
            </div>
          </div>
        </Overlay>
      )}

      {/* Detail */}
      {selected && (
        <ResidentDetail person={selected} people={people} rels={rels} th={th} isDark={isDark}
          onClose={()=>setSel(null)} onUpdate={update} onDelete={remove}
          onAddRel={addRel} onRemoveRel={removeRel}/>
      )}
    </div>
  );
}

hxsUUUVr9bqbLQXsIk6aSw5wKtRaaeCf05oorOWIm0UqMUX4dOPXYT9eKvxWap98gj+6OlFFckqkm9TRK2xZChRgCloorMAooooA//Z";

  const loadCloud=async()=>{
    const cloud=await sbLoad();
    if(cloud?.people){
      setPeople(cloud.people);
      setRels(cloud.rels||[]);
      if(cloud.people.length){
        const mp=Math.max(...cloud.people.map(p=>p.id??0),0); if(mp>=NID)NID=mp+1;
      }
      if((cloud.rels||[]).length){
        const mr=Math.max(...cloud.rels.map(r=>r.id??0),0); if(mr>=RID)RID=mr+1;
      }
    }
  };

  // Initial load
  useEffect(()=>{
    const timeout=setTimeout(()=>{
      loaded.current=true;
      setSplashFading(true);
      setTimeout(()=>setAppReady(true),500);
    },8000);
    loadCloud().then(()=>{
      clearTimeout(timeout);
      loaded.current=true;
      setSplashFading(true);
      setTimeout(()=>setAppReady(true),500);
    });
  },[]);

  // Poll every 15s + re-sync on visibility/focus
  useEffect(()=>{
    const sync=()=>{ if(loaded.current) loadCloud(); };
    const onVis=()=>{ if(document.visibilityState==="visible") sync(); };
    document.addEventListener("visibilitychange",onVis);
    window.addEventListener("focus",sync);
    window.addEventListener("pageshow",sync);
    const poll=setInterval(sync,15000);
    return ()=>{ clearInterval(poll); document.removeEventListener("visibilitychange",onVis); window.removeEventListener("focus",sync); window.removeEventListener("pageshow",sync); };
  },[]);

  // Save to Supabase on every change (gated, debounced 600ms)
  useEffect(()=>{
    if(!loaded.current) return;
    setSyncStatus("saving");
    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(async()=>{
      const ok=await sbSave({people,rels});
      setSyncStatus(ok?"saved":"error");
      setTimeout(()=>setSyncStatus("idle"),2000);
    },600);
  },[people,rels]);

  // Force-save on page hide
  useEffect(()=>{
    const save=()=>{ if(loaded.current) sbSave({people,rels}); };
    const onVis=()=>{ if(document.visibilityState==="hidden") save(); };
    document.addEventListener("visibilitychange",onVis);
    window.addEventListener("pagehide",save);
    return ()=>{ document.removeEventListener("visibilitychange",onVis); window.removeEventListener("pagehide",save); };
  },[people,rels]);

  const manualSave=async()=>{
    if(syncStatus==="saving") return;
    setSyncStatus("saving");
    const ok=await sbSave({people,rels});
    setSyncStatus(ok?"saved":"error");
    setTimeout(()=>setSyncStatus("idle"),2500);
  };

  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(null),2500);};
  const th=T[appMode];
  const isDark=th.isDark;

  if(!appReady) return (
    <div style={{position:"fixed",inset:0,background:"#fff",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",opacity:splashFading?0:1,transition:"opacity 0.5s ease"}}>
      <div style={{width:100,height:100,borderRadius:20,overflow:"hidden",boxShadow:"0 8px 32px rgba(0,0,0,0.2)",marginBottom:22}}>
        <img src={SPLASH} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
      </div>
      <div style={{fontSize:10,color:"#999",letterSpacing:3,textTransform:"uppercase",marginBottom:8}}>Loading</div>
      <div style={{fontSize:20,fontWeight:800,color:"#1C1E22",letterSpacing:-0.5,marginBottom:28}}>The Shape of The City</div>
      <div style={{display:"flex",gap:6}}>
        {[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:"50%",background:"#E8A020",animation:`dotPulse 1.4s ease-in-out ${i*0.2}s infinite`}}/>)}
      </div>
    </div>
  );

  const NAV=[
    {key:"relationship",label:"Relationship",icon:a=><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={a?2.2:1.6} strokeLinecap="round" strokeLinejoin="round"><circle cx="5" cy="6" r="3"/><circle cx="19" cy="6" r="3"/><circle cx="12" cy="18" r="3"/><path d="M7.5 8L10.5 15.5M16.5 8L13.5 15.5M8 6h8"/></svg>},
    {key:"residents",label:"Residents",icon:a=><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={a?2.2:1.6} strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>},
  ];

  return (
    <div style={{position:"fixed",inset:0,display:"flex",flexDirection:"column",background:th.bg,fontFamily:"-apple-system,'Helvetica Neue',Arial,sans-serif",color:th.text,transition:"background 0.3s"}}>
      {/* Header */}
      <div style={{flexShrink:0,background:th.panel,borderBottom:`1px solid ${th.divider}`,paddingTop:"env(safe-area-inset-top,0px)",zIndex:50}}>
        <div style={{padding:"10px 14px",display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:32,height:32,borderRadius:7,background:"#1C1E22",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:15,fontWeight:800,color:th.text,letterSpacing:-0.3,lineHeight:1}}>The Shape of The City</div>
          </div>
          <button onClick={()=>setAppMode(m=>m==="day"?"night":"day")} style={{display:"flex",alignItems:"center",gap:5,padding:"5px 10px",borderRadius:4,border:`1px solid ${th.divider}`,background:th.card,cursor:"pointer",fontFamily:"inherit"}}>
            {isDark?<svg width="12" height="12" viewBox="0 0 24 24" fill={th.accent}><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>:<svg width="12" height="12" viewBox="0 0 24 24" fill="#E8A020"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" fill="none" stroke="#E8A020" strokeWidth="2" strokeLinecap="round"/></svg>}
            <span style={{fontSize:10,fontWeight:700,color:th.textSub,letterSpacing:0.5}}>{isDark?"NIGHT":"DAY"}</span>
          </button>
          <button onClick={manualSave} disabled={syncStatus==="saving"} style={{display:"flex",alignItems:"center",gap:4,padding:"5px 10px",borderRadius:4,border:`1px solid ${syncStatus==="saved"?th.green:syncStatus==="error"?th.red:th.divider}`,background:syncStatus==="saved"?th.green+"18":th.card,color:syncStatus==="saved"?th.green:syncStatus==="error"?th.red:th.textSub,cursor:syncStatus==="saving"?"not-allowed":"pointer",fontFamily:"inherit",flexShrink:0}}>
            {syncStatus==="saving"?<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={th.textMuted} strokeWidth="2" className="spin-icon"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>:syncStatus==="saved"?<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={th.green} strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>:<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={th.textSub} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>}
            <span style={{fontSize:9,fontWeight:700,letterSpacing:0.5}}>{syncStatus==="saving"?"SAVING":syncStatus==="saved"?"SAVED":syncStatus==="error"?"ERROR":"SAVE"}</span>
          </button>
        </div>
      </div>

      {/* Content */}
      <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",padding:"12px 12px 8px"}}>
        {page==="relationship"&&<RelationshipPage people={people} rels={rels} th={th} isDark={isDark}/>}
        {page==="residents"&&<ResidentsPage people={people} setPeople={setPeople} rels={rels} setRels={setRels} th={th} isDark={isDark} showToast={showToast}/>}
        <div style={{height:8}}/>
      </div>

      {/* Tab bar */}
      <div style={{flexShrink:0,background:th.panel,borderTop:`1px solid ${th.divider}`,paddingBottom:"max(env(safe-area-inset-bottom,0px),4px)",display:"flex",zIndex:50,minHeight:56}}>
        {NAV.map(n=>{
          const active=page===n.key;
          return (
            <button key={n.key} onClick={()=>setPage(n.key)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,padding:"9px 4px 11px",background:"transparent",border:"none",color:active?th.accent:th.textMuted,cursor:"pointer",fontFamily:"inherit",position:"relative",WebkitTapHighlightColor:"transparent"}}>
              {active&&<div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:24,height:2,background:th.accent,borderRadius:"0 0 2px 2px"}}/>}
              {n.icon(active)}
              <span style={{fontSize:9,fontWeight:active?700:400,letterSpacing:0.3,textTransform:"uppercase"}}>{n.label}</span>
            </button>
          );
        })}
      </div>

      {/* Toast */}
      {toast&&<div style={{position:"fixed",bottom:"calc(env(safe-area-inset-bottom,0px) + 72px)",left:"50%",transform:"translateX(-50%)",background:"#1C1E22",borderRadius:4,padding:"8px 18px",fontSize:12,fontWeight:600,color:"#fff",zIndex:600,boxShadow:"0 4px 16px rgba(0,0,0,0.3)",whiteSpace:"nowrap",animation:"fadeSlide 0.3s ease",letterSpacing:0.3}}>{toast}</div>}
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
